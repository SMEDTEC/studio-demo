html, body { margin: 0; }

.qcs button { font-family: inherit; cursor: pointer; }
.qcs button:focus-visible, .qcs [tabindex]:focus-visible { outline: 2px solid #00C5A8; outline-offset: 2px; }
.nav-item { transition: background .15s ease, color .15s ease; }
.nav-item:hover { background: #F3F6FA; }
.row-hover { transition: background .15s ease; }
.row-hover:hover { background: #F3F6FA; }
.thread { transition: opacity .2s ease, stroke-width .2s ease; }
.claim-chip { transition: border-color .2s ease, background .2s ease, transform .15s ease; }
.claim-chip:hover { transform: translateX(2px); }
.prod-card { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }

.wz-chip { transition: border-color .15s ease, background .15s ease; }
.wz-chip:hover { border-color: #BBDFEC; }
.wz-spin { width: 34px; height: 34px; border: 3px solid #E3E9F0; border-top-color: #00C5A8; border-radius: 50%; animation: wzspin .8s linear infinite; }
@keyframes wzspin { to { transform: rotate(360deg); } }
.wz-step { opacity: 0; transform: translateY(4px); animation: wzrise .5s ease forwards; }
@keyframes wzrise { to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: reduce) { .wz-step { opacity: 1; transform: none; animation: none; } .wz-spin { animation: none; } }
@media (prefers-reduced-motion: reduce) { .qcs * { transition: none !important; animation: none !important; } }
@media (max-width: 900px) {

  .qcs-gate { grid-template-columns: 1fr !important; }

}

function ring(pct, size, label){
  size = size || 120; label = label || "READY";
  var r = size/2 - 14, circ = 2*Math.PI*r, off = circ*(1 - pct/100);
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px;flex:none;">'+
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);">'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+Q.hair+'" stroke-width="10"/>'+
    '<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+Q.gold+'" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'"/></svg>'+
    '<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;"><div>'+
    '<div style="font-size:'+(size*0.26)+'px;color:'+Q.ink+';font-weight:700;">'+pct+'<span style="font-size:'+(size*0.12)+'px;">%</span></div>'+

}

/* ---- substantiation map ---- */
function substantiationMap(mapId, claimIds, evidenceIds, title, compact){
  var claims = (claimIds || CLAIMS.map(function(c){return c.id;})).map(function(id){return CLAIM[id];}).filter(Boolean);
  var evList = (evidenceIds || EVIDENCE.map(function(e){return e.id;})).map(function(id){
    return EVIDENCE.filter(function(e){return e.id===id;})[0];
  }).filter(Boolean);
  var H = compact ? 280 : 392;
  var sel = state.sel[mapId] || null;
  var n = claims.length, m = evList.length, W = 150;
  var evIndex = {}; evList.forEach(function(e,j){ evIndex[e.id]=j; });
  function cY(i){ return ((i+0.5)/n)*H; }
  function eY(j){ return ((j+0.5)/m)*H; }
  var threads = [];
  claims.forEach(function(c,i){ (LINKS[c.id]||[]).forEach(function(eid){
    var j = evIndex[eid]; if (j == null) return; threads.push({cid:c.id, y1:cY(i), y2:eY(j)});
  }); });
  var threadSvg = threads.map(function(t){
    var active = sel===t.cid, dim = sel && !active;
    var w = active?2.4:1.2, op = dim?0.08:active?0.95:0.34;
    return '<path class="thread" d="M 0 '+t.y1+' C '+(W*0.5)+' '+t.y1+', '+(W*0.5)+' '+t.y2+', '+W+' '+t.y2+'" fill="none" stroke="'+Q.gold+'" stroke-width="'+w+'" opacity="'+op+'"/>';
  }).join('');
  var claimChips = claims.map(function(c){
    var active = sel===c.id, dim = sel && !active;
    return '<button class="claim-chip" data-sel-claim="'+c.id+'" data-map="'+mapId+'" style="text-align:left;border:1px solid '+(active?riskColor(c.risk):Q.hair)+';background:'+(active?riskColor(c.risk)+'10':Q.surface)+';opacity:'+(dim?0.4:1)+';border-radius:9px;padding:7px 11px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;"><span style="font-size:12.5px;color:'+Q.ink+';line-height:1.3;">'+c.text+'</span>'+
      '<span style="width:8px;height:8px;border-radius:99px;background:'+riskColor(c.risk)+';flex:none;"></span></div></button>';
  }).join('');
  var evCards = evList.map(function(e){
    var linked = sel && (LINKS[sel]||[]).indexOf(e.id) > -1, dim = sel && !linked, s = STATUS[e.status];
    return '<div style="border:1px solid '+(linked?Q.gold:Q.hair)+';background:'+(linked?Q.gold+'10':Q.surface)+';opacity:'+(dim?0.4:1)+';border-radius:9px;padding:6px 11px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;"><span style="font-size:12px;color:'+Q.ink+';line-height:1.25;">'+e.name+'</span>'+
      '<span style="width:8px;height:8px;border-radius:99px;background:'+s.c+';flex:none;"></span></div>'+
      '<div style="font-family:\'JetBrains Mono\',monospace;font-size:9.5px;color:'+Q.muted+';margin-top:2px;">'+e.std+'</div></div>';
  }).join('');
  return card('padding:0;overflow:hidden;',
    '<div style="padding:18px 20px 8px;border-bottom:1px solid '+Q.hair+';">'+eyebrow('The substantiation map')+
      '<div style="font-size:19px;color:'+Q.ink+';font-weight:700;letter-spacing:-.01em;">'+title+'</div>'+
      '<div style="color:'+Q.muted+';font-size:12.5px;margin-top:4px;">Select a claim to follow its evidence. Claims with thin or no threads are the commercial exposure.</div></div>'+
    '<div class="qcs-map" style="display:grid;grid-template-columns:1fr '+W+'px 1fr;padding:16px 18px 20px;">'+
      '<div style="display:flex;flex-direction:column;justify-content:space-around;height:'+H+'px;">'+claimChips+'</div>'+
      '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none" style="overflow:visible;" aria-hidden="true">'+threadSvg+'</svg>'+
      '<div style="display:flex;flex-direction:column;justify-content:space-around;height:'+H+'px;">'+evCards+'</div></div>'
  );
}

    }).join('');

  return '<div style="display:grid;gap:18px;">'+
    '<button data-back="1" style="border:none;background:transparent;color:'+Q.goldDeep+';font-family:\'JetBrains Mono\',monospace;font-size:11.5px;letter-spacing:.04em;padding:0;width:fit-content;">← Portfolio</button>'+

      productPlate(p,96)+'<div style="flex:1;min-width:240px;">'+
      '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;letter-spacing:.06em;color:'+Q.muted+';text-transform:uppercase;">'+CAT[p.cat].label+'</div>'+
      '<div style="font-size:26px;color:'+Q.ink+';font-weight:700;margin-top:2px;letter-spacing:-.01em;">'+p.name+'</div>'+

      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">'+pill(post.c,post.label)+pill(st.c,st.label)+pill(Q.gold,p.ready+'% ready')+'</div></div>'+

    card('border-left:3px solid '+post.c+';background:'+post.c+'08;', eyebrow('Posture note')+'<div style="font-size:14px;color:'+Q.ink+';line-height:1.5;">'+p.note+'</div>')+
    '<div class="qcs-two" style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">'+
      card('', eyebrow('Market availability')+'<div style="display:grid;gap:10px;margin-top:6px;">'+mktRows+'</div>')+

  '</div>';
}

/* ---- supplier ---- */
function supplier(){
  function vc(v){
    if (["Certified","In place","Signed","Defined","On-site complete"].indexOf(v) > -1) return Q.sage;
    if (v === "Unconfirmed") return Q.clay;
    if (v === "—") return Q.muted;
    return Q.amber;
  }
  var cards = SUPPLIERS.map(function(s){
    var attrs = Object.keys(s.attrs).map(function(k){ var v=s.attrs[k];
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid '+Q.hair+';padding:7px 0;">'+
        '<span style="font-size:12.5px;color:'+Q.muted+';">'+k+'</span>'+
        '<span style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:'+Q.ink+';"><span style="width:8px;height:8px;border-radius:99px;background:'+vc(v)+';"></span>'+v+'</span></div>';
    }).join('');
    return card('', '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">'+
      '<div><div style="font-size:16.5px;color:'+Q.ink+';font-weight:600;">'+s.name+'</div>'+
      '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:'+Q.muted+';margin-top:3px;text-transform:uppercase;letter-spacing:.04em;">'+s.loc+' · '+s.scope+'</div></div>'+
      pill(s.risk==="ok"?Q.sage:Q.amber, s.risk==="ok"?"Qualified":"In qualification")+'</div>'+
      '<div style="margin-top:12px;">'+attrs+'</div>'+
      '<div style="margin-top:10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;color:'+Q.goldDeep+';">Audit · '+s.audit+'</div>');
  }).join('');
  var sumItems = [
    ["Certifications","ISO 13485 / ISO 22716 on file and current"],
    ["Quality agreement","Signed and in force per supplier"],
    ["Change control","Notified before it ships, not after"],
    ["Manufacturer data","Their reports audited, not assumed"]
  ];
  var sum = sumItems.map(function(it){
    return '<div style="background:'+Q.surface2+';border:1px solid '+Q.hair+';border-radius:10px;padding:14px;">'+
      '<div style="font-size:13px;color:'+Q.ink+';font-weight:600;">'+it[0]+'</div>'+
      '<div style="font-size:12px;color:'+Q.muted+';margin-top:3px;">'+it[1]+'</div></div>';
  }).join('');
  return '<div>'+moduleHeader('Supplier management','Your manufacturers, under control','Each contract manufacturer pulled into a controlled workflow — certifications, quality agreement, change control and incoming acceptance — so the data behind every product is yours, audited and current.')+
    '<div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px,1fr));gap:16px;">'+cards+'</div>'+
    '<div style="margin-top:26px;">'+eyebrow('What &ldquo;under control&rdquo; means')+'<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px,1fr));gap:12px;">'+sum+'</div></div></div>';
}

/* ---- compliance modules ---- */
function tableShell(cols, labels, rows){
  var head = labels.map(function(l){return '<div>'+l+'</div>';}).join('');
  return card('padding:0;overflow:hidden;',
    '<div style="display:grid;grid-template-columns:'+cols+';background:'+Q.surface2+';border-bottom:1px solid '+Q.hair+';font-family:\'JetBrains Mono\',monospace;font-size:9.5px;letter-spacing:.1em;color:'+Q.muted+';text-transform:uppercase;padding:12px 20px;">'+head+'</div>'+rows);
}
function trow(cols, cells, last){
  return '<div class="row-hover" style="display:grid;grid-template-columns:'+cols+';align-items:center;padding:14px 20px;border-bottom:'+(last?'none':'1px solid '+Q.line2)+';font-size:13px;color:'+Q.ink+';">'+cells+'</div>';
}
function evidenceModule(){
  var cols = "2.2fr 1.4fr 1fr 1fr";

    return trow(cols, '<div style="padding-right:10px;">'+e.name+'</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:'+Q.muted+';">'+e.std+'</div><div style="color:'+(e.prov==="Manufacturer"?Q.clay:Q.ink70)+';font-size:12.5px;">'+e.prov+'</div><div>'+pill(s.c,s.label)+'</div>', i===EVIDENCE.length-1);
  }).join('');
  return '<div>'+moduleHeader('Evidence portal','The substantiation file','Every report and study in one place, tagged by standard, provenance and state. Independent and accredited data carries the weight; manufacturer data is flagged for revalidation.')+tableShell(cols,["Evidence","Standard","Provenance","State"],rows)+'</div>';
}
function claimsModule(){
  var markets = ["US","EU","UK","AU"];
  var grid = {c5:["flag","flag","flag","flag"], c6:["flag","flag","flag","flag"], c9:["flag","flag","flag","flag"], c8:["flag","flag","flag","flag"], c7:["ok","watch","watch","watch"], c3:["ok","ok","ok","watch"]};
  var cols = "2.4fr 1fr 1.4fr";
  var rows = CLAIMS.map(function(c,i){
    return trow(cols, '<div style="padding-right:10px;">'+c.text+'</div><div style="font-size:12px;color:'+Q.muted+';">'+c.kind+'</div><div>'+pill(riskColor(c.risk),riskLabel(c.risk))+'</div>', i===CLAIMS.length-1);
  }).join('');
  function cell(v){ return '<span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+riskColor(v)+';" title="'+riskLabel(v)+'"></span>'; }
  var matrixRows = '<div></div>' + markets.map(function(m){return '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:'+Q.muted+';text-align:center;">'+m+'</div>';}).join('');
  Object.keys(grid).forEach(function(cid){
    matrixRows += '<div style="font-size:12.5px;color:'+Q.ink+';padding:9px 0;border-top:1px solid '+Q.hair+';">'+CLAIM[cid].text+'</div>' +
      grid[cid].map(function(v){return '<div style="display:grid;place-items:center;border-top:1px solid '+Q.hair+';">'+cell(v)+'</div>';}).join('');
  });
  var matrix = card('', eyebrow('Per-market matrix')+'<div style="display:grid;grid-template-columns:2.2fr repeat(4, 1fr);margin-top:6px;">'+matrixRows+'</div>'+
    '<div style="margin-top:12px;font-size:12px;color:'+Q.muted+';border-top:1px dashed '+Q.hair+';padding-top:10px;">Note · Australia flags the sunscreen (SPF) line as therapeutic and a chemical-introduction question — held against the per-market position until resolved.</div>');
  return '<div>'+moduleHeader('Claims governance','The compliance line, claim by claim, market by market','Every claim held against the line in each market — nothing goes live without bound evidence. The exposures span the range: disease claims on the therapy device, and the OTC drug claims on the SPF and fluoride lines.')+
    '<div style="display:grid;gap:16px;">'+tableShell(cols,["Claim","Type","Position"],rows)+matrix+'</div></div>';
}
function testingModule(){
  function dColor(d){ return d==="Accept"?Q.sage:d==="Bridge"?Q.amber:d==="Repeat"?Q.gold:Q.clay; }
  var cols = "2fr 1.1fr 1fr 1fr 0.8fr 1fr";
  var rows = TESTS.map(function(t,i){ var s=STATUS[t.status];
    return trow(cols, '<div style="padding-right:8px;">'+t.name+'</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:'+Q.muted+';">'+t.std+'</div><div>'+pill(dColor(t.decision),t.decision)+'</div><div style="font-size:12.5px;color:'+Q.ink70+';">'+t.lab+'</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:'+Q.muted+';">'+t.gate+'</div><div>'+pill(s.c,s.label)+'</div>', i===TESTS.length-1);
  }).join('');
  return '<div>'+moduleHeader('Testing programme','Accept, bridge, or repeat — per test','Existing manufacturer data is audited first, then each test is accepted as-is, bridged with a justification, or independently repeated. The plan funds genuine gaps, not duplicates.')+
    tableShell(cols,["Test","Standard","Decision","Lab","Gate","State"],rows)+
    '<div style="margin-top:12px;font-family:\'JetBrains Mono\',monospace;font-size:11px;color:'+Q.statGold+';">Accredited testing billed at cost — no consultancy margin on pass-through lab costs.</div></div>';
}
function riskVigilanceModule(){

    '<div>'+moduleHeader('Post-market surveillance','Adverse-event intake','Recordkeeping and serious-event reporting are a live obligation across markets — intake, triage and trending in one workflow.')+tableShell(vc,["Event","Market","Severity","Action","State"],vigRows)+'</div></div>';
}
function supplierModule(){

    {k:"ISO 13485 (QMS)", v:"Unconfirmed", c:Q.clay},

    '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px,1fr));gap:14px;">'+cardsHtml+'</div></div>';

function marketAccessModule(){

function compliance(){
  var tabs = [["claims","Claims"],["evidence","Evidence"],["testing","Testing"],["risk","Risk &amp; post-market"],["market","Markets"]];

  return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:'+Q.gold+'0F;border:1px solid '+Q.gold+'3D;border-radius:13px;padding:13px 16px;">'+
    '<span style="font-size:12.5px;color:'+Q.ink+';line-height:1.45;"><strong style="color:'+Q.goldDeep+';">Built for '+COMPANY+'.</strong>'+(FOCUS.length?' Focus: '+FOCUS.join(' · ')+'.':'')+' This view came from your answers — a real build is bespoke and wired to your systems.</span>'+
    '<button data-rebuild style="flex:none;border:1px solid '+Q.gold+'66;background:'+Q.gold+'12;color:'+Q.goldDeep+';border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;">Rebuild</button></div>';
}
function buildFromWizard(){
  var w=state.wiz;
  COMPANY = (w.company||'').trim() || 'Your Company';
  var types = (w.types&&w.types.length)?w.types:['skincare','monitor'];
  var POST={skincare:'cosmetic',haircare:'cosmetic',oral:'watch',monitor:'device',therapy:'device',wellbeing:'watch',acc:'none'};
  var SAMPLE={skincare:['Daily Moisturiser','Vitamin C Serum'],haircare:['Nourishing Shampoo','Repair Conditioner'],oral:['Whitening Toothpaste','Sonic Toothbrush'],monitor:['Digital Thermometer','Pulse Oximeter'],therapy:['TENS Relief Unit','Heat Therapy Pad'],wellbeing:['Smart Scale','Activity Band'],acc:['Sleep Mask','Travel Case']};
  var PFX={skincare:'SKN',haircare:'HAIR',oral:'ORAL',monitor:'MON',therapy:'THR',wellbeing:'WEL',acc:'ACC'};
  PRODUCTS=[]; META={}; var n=1;
  types.forEach(function(cat){
    (SAMPLE[cat]||['Product A','Product B']).forEach(function(nm){
      var id='w'+n, post=POST[cat]||'cosmetic';
      var ready = post==='device'?(35+Math.floor(Math.random()*25)) : post==='watch'?(56+Math.floor(Math.random()*18)) : post==='none'?(94+Math.floor(Math.random()*5)) : (80+Math.floor(Math.random()*14));
      var mx = post==='device'?(72+Math.floor(Math.random()*16)) : post==='watch'?(42+Math.floor(Math.random()*14)) : post==='none'?(6+Math.floor(Math.random()*8)) : (14+Math.floor(Math.random()*16));
      PRODUCTS.push({id:id,name:nm,cat:cat,posture:post,stage:'market',flagship:false,ready:ready,spec:'Example SKU created from your setup',note:'Created from your wizard answers \u2014 a real build would carry its full spec, claims and evidence.',markets:[post==='device'?'watch':'ok','ok','ok',post==='device'?'watch':'ok'],claims:[],mx:mx,my:ready});
      META[id]={sku:(PFX[cat]||'SKU')+'-'+(100+n),owner:'You'}; n++;
    });
  });
  var fl = PRODUCTS.filter(function(p){return p.posture==='device';})[0] || PRODUCTS[0];
  if(fl) fl.flagship=true;
  var sys=w.systems||[];
  var KNOWN={Slack:'Alerts \u2192 #compliance',ClickUp:'Tasks \u2194 ClickUp','Monday.com':'Boards \u2194 Monday',Airtable:'Records \u2194 Airtable',Excel:'Exports \u2192 Excel'};
  INTEGRATIONS = Object.keys(KNOWN).map(function(nm){ var on=sys.indexOf(nm)>-1; return {name:nm,flow:KNOWN[nm],sync:on?'just now':'',on:on}; });
  if(sys.indexOf('Other')>-1) INTEGRATIONS.push({name:'Your tool',flow:'Custom API',sync:'just now',on:true});
  var IT={claims:'Review the claims matrix',supplier:'Sign supplier quality agreement',evidence:'Bind evidence to every claim',market:'Map market access (US/EU/UK/AU)',audit:'Assemble the audit pack',manual:'Replace the tracking spreadsheets'};
  TASKS=[]; (w.issues||[]).forEach(function(k,idx){ if(IT[k]) TASKS.push({t:IT[k],sku:'\u2014',owner:'You',due:'TBC',status:idx===0?'doing':'todo',prio:idx===0?'high':'med'}); });
  if(!TASKS.length) TASKS.push({t:'Set up your first workstream',sku:'\u2014',owner:'You',due:'TBC',status:'todo',prio:'med'});
  FOCUS = (w.issues||[]).map(function(k){var f=ISSUE_OPTS.filter(function(o){return o[0]===k;})[0];return f?f[1]:k;});
  WIZ_DONE=true; persist();
}

function render(){
  if(state.screen==="gate") root.innerHTML = gateScreen();
  else if(state.screen==="wizard") root.innerHTML = wizardScreen();
  else root.innerHTML = shell();
  var L=document.getElementById("sa-launch"); if(L) L.style.display = (state.screen==="app") ? "flex" : "none";
}

root.addEventListener("click", function(e){
  if (e.target && e.target.id === "modalbg") { state.modal = null; render(); return; }
  var t = e.target.closest("[data-nav],[data-open-product],[data-back],[data-filter],[data-tab],[data-sel-claim],[data-add-product],[data-add-task],[data-toggle-int],[data-rename-company],[data-modal-close],[data-modal-save],[data-reset-demo],[data-dismiss-tip],[data-open-assistant],[data-gate],[data-wiz-next],[data-wiz-back],[data-wiz-toggle],[data-wiz-build],[data-rebuild]");
  if (!t) return;
  if (t.hasAttribute("data-modal-save")) {
    var k = t.getAttribute("data-modal-save");
    if (k === "product") addProduct(); else if (k === "task") addTask(); else if (k === "company") setCompany();
  } else if (t.hasAttribute("data-modal-close")) {
    state.modal = null; render();
  } else if (t.hasAttribute("data-add-product")) {
    state.modal = "product"; render();
  } else if (t.hasAttribute("data-add-task")) {
    state.modal = "task"; render();
  } else if (t.hasAttribute("data-open-assistant")) {
    if (window.openAssistant) window.openAssistant();
  } else if (t.hasAttribute("data-rename-company")) {
    state.modal = "company"; render();
  } else if (t.hasAttribute("data-toggle-int")) {
    toggleInt(t.getAttribute("data-toggle-int"));
  } else if (t.hasAttribute("data-reset-demo")) {
    resetDemo(); state.modal = null; render();
  } else if (t.hasAttribute("data-dismiss-tip")) {
    state.tip = false; render();
  } else if (t.hasAttribute("data-sel-claim")) {
    var mid = t.getAttribute("data-map"), cid = t.getAttribute("data-sel-claim");
    state.sel[mid] = (state.sel[mid] === cid) ? null : cid; render();
  } else if (t.hasAttribute("data-open-product")) {
    state.product = t.getAttribute("data-open-product"); state.view = "portfolio"; render(); window.scrollTo(0,0);
  } else if (t.hasAttribute("data-back")) {
    state.product = null; render();
  } else if (t.hasAttribute("data-nav")) {
    state.product = null; state.view = t.getAttribute("data-nav"); render(); window.scrollTo(0,0);
  } else if (t.hasAttribute("data-filter")) {
    state.filter = t.getAttribute("data-filter"); render();
  } else if (t.hasAttribute("data-tab")) {
    state.tab = t.getAttribute("data-tab"); render();
  } else if (t.hasAttribute("data-gate")) {
    var g = t.getAttribute("data-gate");
    if (g === "sample") { resetDemo(); state.screen = "app"; state.view = "studio"; state.product = null; render(); window.scrollTo(0,0); }
    else if (g === "build") { state.wiz = { step:0, company:state.wiz.company||"", types:[], systems:[], issues:[], building:false }; state.screen = "wizard"; render(); }
    else if (g === "home") { state.screen = "gate"; render(); }
  } else if (t.hasAttribute("data-wiz-next")) {
    if (state.wiz.step === 0) { var ci = document.getElementById("wz_company"); if (ci) state.wiz.company = ci.value.trim(); }
    state.wiz.step = Math.min(4, state.wiz.step + 1); render();
  } else if (t.hasAttribute("data-wiz-back")) {
    state.wiz.step = Math.max(0, state.wiz.step - 1); render();
  } else if (t.hasAttribute("data-wiz-toggle")) {
    var parts = t.getAttribute("data-wiz-toggle").split(":"), key = parts[0], val = parts[1];
    var arr = state.wiz[key] || (state.wiz[key] = []);
    var ix = arr.indexOf(val); if (ix > -1) arr.splice(ix,1); else arr.push(val);
    render();
  } else if (t.hasAttribute("data-wiz-build")) {
    state.wiz.building = true; render();
    setTimeout(function(){ buildFromWizard(); state.wiz.building = false; state.screen = "app"; state.view = "studio"; state.product = null; render(); window.scrollTo(0,0); }, 2600);
  } else if (t.hasAttribute("data-rebuild")) {
    WIZ_DONE = false; FOCUS = []; state.wiz = { step:0, company:"", types:[], systems:[], issues:[], building:false }; state.screen = "wizard"; persist(); render();
  }
});

/* ===== Studio Assistant — scripted illustration (not a live AI) ===== */
(function(){
  var css = document.createElement("style");
  css.textContent = ""
    + "#sa-launch{position:fixed;right:22px;bottom:22px;z-index:80;display:flex;align-items:center;gap:10px;}"
    + "#sa-launch .lbl{background:#fff;border:1px solid "+Q.hair+";color:"+Q.ink+";font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:999px;box-shadow:0 10px 24px -16px rgba(26,36,51,.5);}"
    + "#sa-launch .btn{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(140deg,#00C5A8,#0a8c7c);box-shadow:0 14px 30px -10px rgba(0,150,128,.6);display:grid;place-items:center;}"
    + "#sa-panel{position:fixed;right:22px;bottom:22px;z-index:81;width:374px;max-width:calc(100vw - 32px);height:566px;max-height:calc(100vh - 44px);background:#fff;border:1px solid "+Q.hair+";border-radius:18px;box-shadow:0 40px 90px -28px rgba(26,36,51,.6);display:none;flex-direction:column;overflow:hidden;font-family:'DM Sans',sans-serif;}"
    + "#sa-panel.open{display:flex;}"
    + ".sa-head{background:radial-gradient(120% 160% at 90% -30%, rgba(0,197,168,.32), transparent 55%), linear-gradient(180deg,#33455f,#293850);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:11px;}"
    + ".sa-head .mk{width:30px;height:30px;border-radius:8px;border:1.5px solid rgba(255,255,255,.4);background:radial-gradient(120% 120% at 28% 18%, rgba(0,197,168,.6), transparent 62%);display:grid;place-items:center;flex:none;}"
    + ".sa-head .t{font-weight:700;font-size:14px;letter-spacing:-.01em;}"
    + ".sa-head .tag{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;color:#bfe9e0;margin-top:2px;}"
    + ".sa-head .x{margin-left:auto;background:transparent;border:none;color:#cdd9e6;font-size:20px;cursor:pointer;line-height:1;}"
    + ".sa-note{background:"+Q.surface2+";border-bottom:1px solid "+Q.hair+";color:"+Q.muted+";font-size:10.5px;line-height:1.45;padding:8px 14px;}"
    + ".sa-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:"+Q.porcelain+";}"
    + ".sa-b{max-width:85%;font-size:12.5px;line-height:1.45;padding:9px 12px;border-radius:13px;}"
    + ".sa-ai{align-self:flex-start;background:#fff;border:1px solid "+Q.hair+";color:"+Q.ink+";border-bottom-left-radius:5px;}"
    + ".sa-me{align-self:flex-end;background:"+Q.gold+"14;border:1px solid "+Q.gold+"40;color:"+Q.ink+";border-bottom-right-radius:5px;}"
    + ".sa-step{align-self:flex-start;display:flex;align-items:center;gap:9px;font-size:12px;color:"+Q.ink+";background:#fff;border:1px solid "+Q.hair+";border-radius:10px;padding:7px 11px;max-width:92%;}"
    + ".sa-step .ck{width:16px;height:16px;border-radius:99px;background:"+Q.sage+";color:#fff;display:grid;place-items:center;font-size:10px;flex:none;}"
    + ".sa-typing{align-self:flex-start;display:flex;gap:4px;padding:11px 12px;background:#fff;border:1px solid "+Q.hair+";border-radius:13px;border-bottom-left-radius:5px;}"
    + ".sa-typing i{width:6px;height:6px;border-radius:99px;background:"+Q.muted+";opacity:.5;animation:sablink 1s infinite;}"
    + ".sa-typing i:nth-child(2){animation-delay:.2s;} .sa-typing i:nth-child(3){animation-delay:.4s;}"
    + "@keyframes sablink{0%,60%,100%{opacity:.25;}30%{opacity:.9;}}"
    + ".sa-sugs{display:flex;flex-wrap:wrap;gap:7px;padding:10px 12px;border-top:1px solid "+Q.hair+";background:#fff;}"
    + ".sa-sugs button{font-size:11.5px;color:"+Q.goldDeep+";border:1px solid "+Q.gold+"55;background:"+Q.gold+"10;border-radius:999px;padding:6px 11px;cursor:pointer;}"
    + ".sa-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid "+Q.hair+";background:#fff;}"
    + ".sa-input input{flex:1;border:1px solid "+Q.hair+";border-radius:10px;padding:9px 11px;font-family:inherit;font-size:12.5px;color:"+Q.ink+";}"
    + ".sa-input .send{border:none;background:"+Q.gold+";color:#06231f;font-weight:600;border-radius:10px;padding:0 15px;cursor:pointer;font-size:12.5px;}"
    + "@media (prefers-reduced-motion: reduce){ .sa-typing i{animation:none;} }";
  document.head.appendChild(css);

  function spark(c){ return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2 L13.6 8.4 L20 10 L13.6 11.6 L12 18 L10.4 11.6 L4 10 L10.4 8.4 Z" fill="'+c+'"/><circle cx="18.6" cy="4.6" r="1.4" fill="'+c+'"/></svg>'; }

  var launch = document.createElement("div");
  launch.id = "sa-launch";
  launch.innerHTML = '<span class="lbl">Studio Assistant</span><button class="btn" aria-label="Open assistant">'+spark("#06231f")+'</button>';
  document.body.appendChild(launch);

  var panel = document.createElement("div");
  panel.id = "sa-panel";
  panel.innerHTML = ""
    + '<div class="sa-head"><span class="mk">'+spark("#bfe9e0")+'</span><div><div class="t">Studio Assistant</div><div class="tag">DEMONSTRATION · SCRIPTED</div></div><button class="x" aria-label="Close">×</button></div>'
    + '<div class="sa-note">An illustration of the Studio assistant. Responses are scripted to show what it would do — a real build would be connected to your data and act for real.</div>'
    + '<div class="sa-msgs" id="sa-msgs"></div>'
    + '<div class="sa-sugs" id="sa-sugs"></div>'
    + '<div class="sa-input"><input id="sa-in" placeholder="Ask the assistant…" /><button class="send" id="sa-send">Send</button></div>';
  document.body.appendChild(panel);

  var msgs = panel.querySelector("#sa-msgs");
  var sugBar = panel.querySelector("#sa-sugs");
  var greeted = false, setupDone = false;

  function scroll(){ msgs.scrollTop = msgs.scrollHeight; }
  function ai(html){ var d=document.createElement("div"); d.className="sa-b sa-ai"; d.innerHTML=html; msgs.appendChild(d); scroll(); }
  function me(text){ var d=document.createElement("div"); d.className="sa-b sa-me"; d.textContent=text; msgs.appendChild(d); scroll(); }
  function step(text){ var d=document.createElement("div"); d.className="sa-step"; d.innerHTML='<span class="ck">✓</span><span>'+text+'</span>'; msgs.appendChild(d); scroll(); }
  function typing(){ var d=document.createElement("div"); d.className="sa-typing"; d.innerHTML="<i></i><i></i><i></i>"; msgs.appendChild(d); scroll(); return d; }
  function after(ms, fn){ setTimeout(fn, ms); }

  var SUGS = [
    ["What is SMEDTEC Studio?", "about"],
    ["Set up a starter portfolio", "setup"],
    ["Check my claims for risks", "claims"],
    ["Connect ClickUp", "clickup"]
  ];
  sugBar.innerHTML = SUGS.map(function(s,i){ return '<button data-sg="'+i+'">'+s[0]+'</button>'; }).join("");

  function addProductSilent(name, cat, posture, stage){
    var id = "p"+Date.now()+Math.floor(Math.random()*99);
    var pfx = {monitor:"MON",therapy:"THR",skincare:"SKN",haircare:"HAIR",oral:"ORAL",wellbeing:"WEL",acc:"ACC"}[cat] || "SKU";
    PRODUCTS.push({id:id,name:name,cat:cat,posture:posture,stage:stage,ready:25,spec:"Added by the assistant",note:"Created by the Studio assistant in this demo session.",markets:["ok","ok","ok","planned"],claims:[],mx:30+Math.floor(Math.random()*40),my:20+Math.floor(Math.random()*28)});
    META[id] = {sku:pfx+"-"+(Math.floor(Math.random()*900)+100), owner:"You"};
    try{ persist(); }catch(e){}
  }
  function addTaskSilent(t, owner, status, prio){ TASKS.push({t:t,sku:"—",owner:owner,due:"TBC",status:status,prio:prio}); try{ persist(); }catch(e){} }
  function toggleIntSilent(name, on){ INTEGRATIONS.forEach(function(i){ if(i.name===name){ i.on=on; i.sync=on?"just now":""; if(on&&i.flow==="Available") i.flow=name+" connected"; } }); try{ persist(); }catch(e){} }

  function runSetup(){
    if(setupDone){ ai("I’ve already set up a starter portfolio — open the <b>Product</b> tab to see it."); return; }
    setupDone = true;
    var t = typing();
    after(750, function(){
      t.remove();
      ai("On it. I’ll create a starter portfolio, map markets, connect a tool and draft the first tasks.");
      after(800,  function(){ addProductSilent("Vitamin C Day Cream","skincare","cosmetic","market"); step("Created SKU · Vitamin C Day Cream"); });
      after(1600, function(){ addProductSilent("Daily SPF 30 Moisturiser","skincare","watch","market"); step("Created SKU · Daily SPF 30 Moisturiser"); });
      after(2400, function(){ addProductSilent("Digital Ear Thermometer","monitor","device","market"); step("Created SKU · Digital Ear Thermometer"); });
      after(3200, function(){ toggleIntSilent("ClickUp", true); step("Connected ClickUp — tasks now sync"); });
      after(4000, function(){ addTaskSilent("Biocompatibility test pack","You","doing","high"); addTaskSilent("Draft claims matrix","You","todo","med"); step("Drafted 2 tasks on the board"); });
      after(4800, function(){ step("Flagged 1 claim that needs evidence"); });
      after(5600, function(){ ai("Done — your starter Studio is ready. Open the <b>Product</b> tab to explore it, or use <b>Reset demo data</b> to start over."); render(); });
    });
  }

  function intent(key){
    if(key==="about"){
      var t=typing(); after(700,function(){ t.remove();
        ai("SMEDTEC Studio is a bespoke product, supplier and compliance system. We build it as a <b>project</b>, on <b>your own infrastructure</b>, and you <b>own it</b> at the end — no subscription, just the small cost of running the back-end tools."); });
    } else if(key==="clickup"){
      var t=typing(); after(650,function(){ t.remove(); ai("Connecting ClickUp…");
        after(550,function(){ toggleIntSilent("ClickUp", true); step("ClickUp connected — tasks sync both ways"); render(); ai("Done. Your project board will stay in step with ClickUp."); }); });
    } else if(key==="claims"){
      var t=typing(); after(750,function(){ t.remove();
        ai("I checked every claim against the line in each market. Four need attention:");
        after(500,function(){ step("“Relieves the pain of arthritis” — disease claim"); });
        after(1000,function(){ step("“Helps prevent tooth decay” — OTC drug claim"); });
        after(1500,function(){ step("“Protects against UVA/UVB (SPF 30)” — OTC drug claim"); });
        after(2000,function(){ step("“Treats the cause of dandruff” — disease claim"); });
        after(2500,function(){ ai("I’ve opened the <b>Claims</b> tab and flagged these, so nothing goes live unsubstantiated."); state.view="compliance"; state.tab="claims"; state.product=null; render(); });
      });
    } else if(key==="setup"){ runSetup(); }
  }

  function openPanel(){
    panel.classList.add("open"); launch.style.display="none";
    if(!greeted){ greeted=true; ai("Hi — I’m a scripted illustration of the SMEDTEC Studio assistant. Pick a suggestion below to see how setup would work."); }
  }
  function closePanel(){ panel.classList.remove("open"); launch.style.display="flex"; }
  function send(){ var inp=panel.querySelector("#sa-in"); var v=inp.value.trim(); if(!v) return; me(v); inp.value="";
    var t=typing(); after(750,function(){ t.remove(); ai("In a live build I’d act on that directly. For this illustration, try one of the suggestions below."); }); }

  launch.querySelector(".btn").addEventListener("click", openPanel);
  panel.querySelector(".x").addEventListener("click", closePanel);
  sugBar.addEventListener("click", function(e){ var b=e.target.closest("[data-sg]"); if(!b) return; var i=+b.getAttribute("data-sg"); me(SUGS[i][0]); intent(SUGS[i][1]); });
  panel.querySelector("#sa-send").addEventListener("click", send);
  panel.querySelector("#sa-in").addEventListener("keydown", function(e){ if(e.key==="Enter") send(); });

  window.openAssistant = openPanel;
})();

render();
</script>
